<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paste</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <ul>
            <li><a href="https://github.com/s1dny/paste" target="_blank">open source</a> pastebin clone</li>
            <li>no ads, no tracking, no cookies</li>
            <li>temporary by default (24 hour expiry)</li>
            <li>unlisted by default (only 22 bits of entropy, do not rely on for security!)</li>
            <li>automatic syntax highlighting with <a href="https://highlightjs.org/" target="_blank">highlight.js</a></li>
        </ul>
        
        <form action="/paste" method="post">
            <textarea name="content" placeholder="paste here" autofocus></textarea>
            <button type="submit" class="btn">create</button>
        </form>
    </div>
</body>
</html>
