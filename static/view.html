<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PASTE_ID}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/tokyo-night-dark.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container">
        <header>
            <p style="display: flex; gap: 32px;">
                <span>{{CREATION_TIME}} UTC</span>
                <span>{{PASTE_SIZE}}</span>
            </p>
            <div class="actions">
                <button id="copy-btn" class="btn">copy</button>
                <button id="raw-btn" class="btn">raw</button>
                <button id="home-btn" class="btn">home</button>
            </div>
        </header>
        
        <div id="toast" class="toast">copied to clipboard</div>
        
        <pre style="visibility: hidden;"><code>{{PASTE_CONTENT}}</code></pre>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            hljs.highlightAll();

            const codeElement = document.querySelector('code');
            const pasteContent = codeElement.textContent ?? '';
            const lines = codeElement.innerHTML.split('\n');
            codeElement.innerHTML = lines.map((line, i) => {
                const num = String(i + 1).padStart(String(lines.length).length, ' ');
                return `<span class="line-number">${num}</span>${line}`;
            }).join('\n');

            document.querySelector('pre').style.visibility = 'visible';

            const copyBtn = document.getElementById('copy-btn');
            const rawBtn = document.getElementById('raw-btn');
            const homeBtn = document.getElementById('home-btn');
            const toast = document.getElementById('toast');

            copyBtn.addEventListener('click', async () => {
                await navigator.clipboard.writeText(pasteContent);
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            });

            rawBtn.addEventListener('click', () => {
                window.location.href = "/{{PASTE_ID}}/raw";
            });

            homeBtn.addEventListener('click', () => {
                window.location.href = "/";
            });
        });
    </script>
</body>
</html>
